<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stripe Setup Expired | PeepLink</title>
  <style>
    :root { color-scheme: light; --navy:#071127; --sky:#0ea5ff; --bg:#eef8ff; --card:#ffffff; --text:#111827; --muted:#6b7280; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:linear-gradient(180deg,var(--navy),var(--bg) 42%); color:var(--text); display:grid; place-items:center; padding:24px; }
    main { width:min(560px,100%); background:var(--card); border-radius:28px; padding:32px; box-shadow:0 24px 80px rgba(7,17,39,.18); text-align:center; }
    .badge { width:68px; height:68px; margin:0 auto 18px; border-radius:999px; display:grid; place-items:center; background:#fef3c7; color:#b45309; font-size:34px; }
    h1 { margin:0 0 10px; font-size:32px; line-height:1.1; }
    p { margin:0 0 22px; color:var(--muted); font-size:18px; line-height:1.45; }
    a { display:inline-block; text-decoration:none; border-radius:999px; padding:14px 22px; font-weight:700; background:var(--sky); color:#fff; }
  </style>
</head>
<body>
  <main>
    <div class="badge">↻</div>
    <h1>Stripe setup expired</h1>
    <p>The Stripe onboarding link expired. Return to PeepLink and tap Update Stripe Onboarding to generate a fresh link.</p>
    <a href="https://peeplinkapp.com">Return to PeepLink</a>
  </main>
</body>
</html>
